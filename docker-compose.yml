# Optional local Postgres. Skip if you use Supabase only (see docs/supabase.md).
services:
  postgres:
    image: postgres:16-alpine
    container_name: bugdraft-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bugdraft
      POSTGRES_USER: bugdraft
      POSTGRES_PASSWORD: bugdraft
    ports:
      - '5432:5432'
    volumes:
      - bugdraft-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U bugdraft -d bugdraft']
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  bugdraft-postgres-data:

# Blueprint for Render + Supabase (no Render Postgres).
# 1) Apply this Blueprint OR mirror these settings in the dashboard.
# 2) In bugdraft-api → Environment, add DATABASE_URL from Supabase (Project Settings → Database → URI, Direct, sslmode=require).
# See docs/supabase.md

services:
  - type: web
    name: bugdraft-api
    runtime: node
    rootDir: backend
    plan: starter
    buildCommand: npm ci && npm run prisma:generate && npm run build
    startCommand: npm run prisma:migrate:deploy && npm start
    healthCheckPath: /api/v1/health
    disk:
      name: bugdraft-uploads
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: FRONTEND_ORIGIN
        fromService:
          type: web
          name: bugdraft-web
          envVarKey: RENDER_EXTERNAL_URL
      - key: UPLOAD_DIR
        value: /var/data/uploads
      - key: AZURE_DEVOPS_ORG_URL
        value: https://dev.azure.com/tech4jc
      - key: AZURE_DEVOPS_PROJECT
        value: 00021-FYNXT Cloud
      - key: AZURE_DEVOPS_API_VERSION
        value: "7.1"

  - type: web
    name: bugdraft-web
    runtime: static
    plan: free
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: bugdraft-api
          envVarKey: RENDER_EXTERNAL_URL
